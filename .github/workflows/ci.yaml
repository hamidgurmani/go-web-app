name: CI Pipeline

on:
  push:
    branches: [ "main" ]

env:
  IMAGE_NAME: hamid009/go-web-app

jobs:

  build-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.22'
    - run: go build -o main
    - run: go test ./...

  code-analysis:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
    - uses: actions/checkout@v4
    - run: go vet ./...

  docker:
    runs-on: ubuntu-latest
    needs: code-analysis
    steps:
    - uses: actions/checkout@v4
    - uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - run: docker build -t $IMAGE_NAME:${{ github.sha }} .
    - run: docker push $IMAGE_NAME:${{ github.sha }}

  update-helm:
    runs-on: ubuntu-latest
    needs: docker
    steps:
    - uses: actions/checkout@v4
    - name: Update Helm values
      run: |
        sed -i "s/tag:.*/tag: \"${GITHUB_SHA}\"/" helm/go-web-app-chart/values.yaml

    - name: Debug after update
      run: cat helm/go-web-app-chart/values.yaml

    - name: Commit changes
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add helm/go-web-app-chart/values.yaml
        git diff --cached --quiet || git commit -m "Update image tag"
        git push
