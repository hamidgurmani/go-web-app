apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-go-web-app
  namespace: go-web-app

spec:
  ingressClassName: nginx
  rules:
  - host: go-web-app.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: go-web-app-svc
            port:
              number: 80
